<div class="create-page">
    <div class="page-header">
        <div>
            <span class="eyebrow">Draft Builder</span>
            <h1>Create Knowledge Draft</h1>
            <p>
                Convert raw logistics input into a structured SOP article for review and publishing.
            </p>
        </div>
    </div>

    <div class="form-card">
        <div *ngIf="errorMessage" class="alert error">
            {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="alert success">
            {{ successMessage }}
        </div>

        <form (ngSubmit)="submitDraft()">
            <div class="form-grid">
                <div class="form-group full">
                    <label for="title">Article Title</label>
                    <input id="title" name="title" type="text" [(ngModel)]="title"
                        placeholder="Example: Late Delivery Handling SOP" />
                </div>

                <div class="form-group full">
                    <label for="summary">Summary</label>
                    <textarea id="summary" name="summary" rows="3" [(ngModel)]="summary"
                        placeholder="Briefly describe what this SOP is about"></textarea>
                </div>

                <div class="form-group">
                    <label for="sourceType">Source Type</label>
                    <select id="sourceType" name="sourceType" [(ngModel)]="sourceType">
                        <option value="TEXT">Text</option>
                        <option value="PDF">PDF</option>
                        <option value="DOCX">DOCX</option>
                        <option value="IMAGE">Image</option>
                        <option value="EMAIL">Email</option>
                        <option value="CHAT">Chat</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Creator</label>
                    <div class="readonly-box">
                        {{ currentUser?.name }} · {{ currentUser?.role }}
                    </div>
                </div>

                <div class="form-group full">
                    <label for="sourceText">Raw Source Input</label>
                    <textarea id="sourceText" name="sourceText" rows="5" [(ngModel)]="sourceText"
                        placeholder="Paste the messy input, email text, Teams message, or notes here"></textarea>
                </div>

                <div class="form-group full">
                    <label for="content">Structured SOP Content</label>
                    <textarea id="content" name="content" rows="8" [(ngModel)]="content"
                        placeholder="Write the cleaned SOP steps here"></textarea>
                </div>

                <div class="form-group full">
                    <label>Tags</label>
                    <div class="tag-list">
                        <button type="button" class="tag-chip" *ngFor="let tag of tags"
                            [class.selected]="isTagSelected(tag.name)" (click)="toggleTag(tag.name)">
                            {{ tag.name }}
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="secondary-btn" routerLink="/articles">
                    Cancel
                </button>

                <button type="submit" class="primary-btn" [disabled]="loading">
                    {{ loading ? 'Creating Draft...' : 'Create Draft' }}
                </button>
            </div>
        </form>
    </div>
</div>
