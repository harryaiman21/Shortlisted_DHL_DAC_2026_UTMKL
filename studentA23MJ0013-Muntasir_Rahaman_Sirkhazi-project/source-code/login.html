<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="assets/js/auth-gate.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-shell">
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Report Summarizer home">
      <span class="brand-mark"></span>
      <span>ReportFlow</span>
    </a>
    <nav class="topnav">
      <div id="protected-links" class="auth-links"></div>
      <div id="auth-links" class="auth-links"></div>
    </nav>
  </header>

  <main class="auth-layout">
    <section class="auth-copy">
      <p class="eyebrow" data-i18n="login.eyebrow">Account access</p>
      <h1 data-i18n="login.title">Log in to your workspace</h1>
      <p class="hero-text" data-i18n="login.text">
        Sign in to save reports, preview uploaded files, and manage everything from one place.
      </p>
    </section>

    <section class="form-card auth-card">
      <form id="login-form">
        <label class="field-label" for="login-email" data-i18n="login.email_label">Email</label>
        <input id="login-email" class="text-input" type="email" placeholder="you@example.com" data-i18n-placeholder="login.email_placeholder" required>

        <label class="field-label" for="login-password" data-i18n="login.password_label">Password</label>
        <input id="login-password" class="text-input" type="password" placeholder="Enter your password" data-i18n-placeholder="login.password_placeholder" required>

        <p class="forgot-link-row">
          <a class="text-link" href="forgot-password.html" data-i18n="login.forgot">Forgot password?</a>
        </p>

        <div class="form-actions auth-actions">
          <button class="primary-button" type="submit" data-i18n="login.submit">Log In</button>
          <a class="secondary-button" href="signup.html" data-i18n="login.create_account">Create account</a>
        </div>
        <p id="login-status" class="helper-text form-status" aria-live="polite"></p>

        <div class="auth-divider"><span data-i18n="common.or">or</span></div>
        <div id="google-signin-container" class="google-signin-container"></div>
      </form>
    </section>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
