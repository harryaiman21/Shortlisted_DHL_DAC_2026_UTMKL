<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script src="assets/js/auth-gate.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-shell">
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Report Summarizer home">
      <span class="brand-mark"></span>
      <span>ReportFlow</span>
    </a>
    <nav class="topnav">
      <div id="protected-links" class="auth-links"></div>
      <div id="auth-links" class="auth-links"></div>
    </nav>
  </header>

  <main class="auth-layout">
    <section class="auth-copy">
      <p class="eyebrow" data-i18n="forgot.eyebrow">Account recovery</p>
      <h1 data-i18n="forgot.title">Forgot your password?</h1>
      <p class="hero-text" data-i18n="forgot.text">
        Enter the email you signed up with and we'll send you a secure link to choose a new password.
      </p>
    </section>

    <section class="form-card auth-card">
      <form id="forgot-form">
        <label class="field-label" for="forgot-email" data-i18n="forgot.email_label">Email</label>
        <input id="forgot-email" class="text-input" type="email" placeholder="you@example.com" data-i18n-placeholder="login.email_placeholder" required>

        <div class="form-actions auth-actions">
          <button class="primary-button" type="submit" data-i18n="forgot.submit">Send reset link</button>
          <a class="secondary-button" href="login.html" data-i18n="forgot.back">Back to log in</a>
        </div>
        <p id="forgot-status" class="helper-text form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
