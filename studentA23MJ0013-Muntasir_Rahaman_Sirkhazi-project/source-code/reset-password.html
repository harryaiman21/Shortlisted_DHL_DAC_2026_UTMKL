<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <script src="assets/js/auth-gate.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-shell">
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="Report Summarizer home">
      <span class="brand-mark"></span>
      <span>ReportFlow</span>
    </a>
  </header>

  <main class="auth-layout">
    <section class="auth-copy">
      <p class="eyebrow" data-i18n="reset.eyebrow">Account recovery</p>
      <h1 data-i18n="reset.title">Choose a new password</h1>
      <p class="hero-text" data-i18n="reset.text">
        Pick a strong password you haven't used before. You'll be signed in once it's saved.
      </p>
    </section>

    <section class="form-card auth-card">
      <form id="reset-form">
        <label class="field-label" for="reset-password" data-i18n="reset.password_label">New password</label>
        <input id="reset-password" class="text-input" type="password" placeholder="At least 8 characters" data-i18n-placeholder="reset.password_placeholder" minlength="8" required>

        <label class="field-label" for="reset-password-confirm" data-i18n="reset.confirm_label">Confirm password</label>
        <input id="reset-password-confirm" class="text-input" type="password" placeholder="Re-enter password" data-i18n-placeholder="reset.confirm_placeholder" minlength="8" required>

        <div class="form-actions auth-actions">
          <button class="primary-button" type="submit" data-i18n="reset.submit">Update password</button>
          <a class="secondary-button" href="login.html" data-i18n="common.cancel">Cancel</a>
        </div>
        <p id="reset-status" class="helper-text form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
